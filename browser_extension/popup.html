<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TWB Cookie Sync</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 300px;
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 16px;
        }

        h2 {
            font-size: 15px;
            color: #64b5f6;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 10px;
            background: #0d47a1;
            padding: 2px 6px;
            border-radius: 10px;
        }

        label {
            font-size: 11px;
            color: #aaa;
            display: block;
            margin: 10px 0 4px;
        }

        input[type=text] {
            width: 100%;
            padding: 6px 8px;
            background: #16213e;
            border: 1px solid #444;
            border-radius: 4px;
            color: #eee;
            font-size: 12px;
        }

        .btn {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background: #1565c0;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: background .2s;
        }

        .btn:hover {
            background: #1976d2;
        }

        .btn.green {
            background: #2e7d32;
        }

        .btn.green:hover {
            background: #388e3c;
        }

        .status {
            margin-top: 12px;
            font-size: 11px;
            color: #aaa;
            background: #16213e;
            padding: 8px;
            border-radius: 4px;
            line-height: 1.7;
        }

        .status .ok {
            color: #81c784;
        }

        .status .err {
            color: #ef9a9a;
        }

        hr {
            border-color: #333;
            margin: 12px 0;
        }

        .btn-outline {
            margin-top: 6px;
            width: 100%;
            padding: 6px;
            background: transparent;
            border: 1px solid #1565c0;
            color: #64b5f6;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-outline:hover {
            background: rgba(21, 101, 192, 0.2);
        }
    </style>
</head>

<body>
    <h2>⚔️ TWB Cookie Sync <span class="badge">v1.0</span></h2>

    <label>Bot server URL</label>
    <input type="text" id="bot-url" placeholder="http://127.0.0.1:5000" />

    <button class="btn" id="save-btn">💾 Save URL</button>
    <button class="btn green" id="sync-btn">🔄 Sync now</button>
    <button class="btn-outline" id="open-panel-btn">🌍 Open Web Panel</button>

    <div class="status" id="status">Loading status…</div>

    <hr>
    <div style="font-size:10px;color:#555;text-align:center;">
        Cookies are sent automatically on change &amp; every 30 min.<br>
        Make sure the bot web server is running first.
    </div>

    <script src="popup.js"></script>
</body>

</html>
